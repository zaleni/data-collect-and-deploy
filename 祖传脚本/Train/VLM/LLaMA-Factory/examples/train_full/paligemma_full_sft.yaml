### model
model_name_or_path: /HOME/uestc_jksong/uestc_jksong_1/HDD_POOL/zhanghaonan/huggingface/paligemma2-3b-pt-224
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: false  # choices: [true, false]
freeze_multi_modal_projector: false  # choices: [true, false]
freeze_language_model: false  # choices: [true, false]
deepspeed: examples/deepspeed/ds_z3_config.json  # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]

### dataset
dataset: bmlm_demo_v24
template: paligemma
cutoff_len: 2048
# max_samples: 1000
overwrite_cache: true
preprocessing_num_workers: 24
dataloader_num_workers: 4

### output
output_dir: /HOME/uestc_jksong/uestc_jksong_1/HDD_POOL/zhanghaonan/saves/paligemma-3b-224/full/bmlm_demo_v24
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false

### train
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
# learning_rate: 1.0e-5
learning_rate: 6.0e-6
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

